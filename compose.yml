networks:
  gift.net:
    driver: bridge

services:

  sql:
    image: mariadb:11
    environment:
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    networks:
      - gift.net

  adminer:
    image: adminer:5
    ports:
      - "8080:8080"
    networks:
      - gift.net
    depends_on:
      - sql

  gift.appli:
    image: operrin/php:8.5.4
    command: php -S 0.0.0.0:80 -t /var/www/html
    ports:
      - "5180:80"
    volumes:
      - ./gift.appli:/var/www/html
      - ./images:/var/www/html/img
      - ./gift.appli/src:/var/www/src
    working_dir: /var/www/src
    networks:
      - gift.net
    depends_on:
      - sql